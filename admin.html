<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — LogicGATE-Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Firebase SDKs (compat version — simpler syntax) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --teal:   #00c2a8;
      --teal-d: #009e88;
      --amber:  #f5a623;
      --dark:   #060b12;
      --mid:    #0d1520;
      --card:   #111d2a;
      --border: rgba(0,194,168,.2);
      --text:   #c8d8e8;
      --error:  #ff5f6d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,194,168,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,194,168,.07) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GLOW ── */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,194,168,.09) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 10;
      background: rgba(6,11,18,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: .7rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--teal);
      text-decoration: none;
      letter-spacing: .06em;
    }
    .topbar-brand span { color: #fff; }
    .topbar-brand em { color: var(--amber); font-style: normal; }
    .topbar-back {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #4a6070;
      text-decoration: none;
      transition: color .2s;
    }
    .topbar-back:hover { color: var(--teal); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── CARD ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 420px;
      padding: 2.8rem 2.4rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(0,194,168,.06);
      position: relative;
      overflow: hidden;
    }
    /* top accent line */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--teal) 50%, transparent 100%);
    }

    .card-icon {
      width: 52px; height: 52px;
      background: rgba(0,194,168,.1);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin: 0 auto 1.4rem;
    }
    .card-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--teal);
      text-align: center;
      margin-bottom: .4rem;
    }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #e8f2ff;
      text-align: center;
      letter-spacing: .05em;
      margin-bottom: 2rem;
    }

    /* ── FORM FIELDS ── */
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4a6478;
      margin-bottom: .45rem;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(0,194,168,.2);
      border-radius: 5px;
      padding: .75rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .88rem;
      color: #e0eaf4;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input::placeholder { color: #2e4455; }
    .field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,194,168,.1);
    }

    /* password toggle wrapper */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.8rem; }
    .pw-toggle {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #3a5060; font-size: 1rem; padding: 0;
      transition: color .2s;
    }
    .pw-toggle:hover { color: var(--teal); }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: .9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .82rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: .6rem;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(0,194,168,.25);
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    .btn-login:hover:not(:disabled) {
      background: var(--teal-d);
      transform: translateY(-1px);
      box-shadow: 0 0 32px rgba(0,194,168,.45);
    }
    .btn-login:disabled { opacity: .55; cursor: not-allowed; }

    /* spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MESSAGE ── */
    #msg {
      margin-top: 1.1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .76rem;
      letter-spacing: .04em;
      text-align: center;
      min-height: 1.2rem;
      color: var(--error);
      line-height: 1.5;
    }
    #msg.success { color: var(--teal); }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.6rem 0 1.2rem;
    }
    .card-footer-note {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .68rem;
      letter-spacing: .06em;
      color: #223040;
      text-align: center;
      line-height: 1.6;
    }
    .card-footer-note span { color: #3a5060; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="topbar-brand" href="index.html">Logic<span>GATE</span><em>-</em>Security</a>
    <a class="topbar-back" href="index.html">← Back to Site</a>
  </header>

  <!-- MAIN -->
  <main>
    <div class="login-card">

      <div class="card-icon">🔐</div>
      <p class="card-label">Restricted Access</p>
      <h1 class="card-title">Admin Login</h1>

      <!-- Email -->
      <div class="field">
        <label for="email">Admin Email</label>
        <input id="email" type="email" placeholder="admin@logicgate-security.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input id="password" type="password" placeholder="••••••••••••" autocomplete="current-password">
          <button class="pw-toggle" id="pwToggle" type="button" title="Show/hide password" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="login()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Sign In →</span>
      </button>

      <p id="msg"></p>

      <hr class="divider">
      <p class="card-footer-note">
        🔒 Authorised personnel only<br>
        <span>All login attempts are logged and monitored</span>
      </p>
    </div>
  </main>

  <script>
    // ── Firebase config ──────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBiE5J-sJ-3kdrLBbm5IpjfXbEOcee3y-8",
      authDomain: "logicgate-security.firebaseapp.com",
      projectId: "logicgate-security",
      storageBucket: "logicgate-security.firebasestorage.app",
      messagingSenderId: "684131958368",
      appId: "1:684131958368:web:05b1e51a56e3c3d0c58d05",
      measurementId: "G-7180ZW5BVV"
    };

    // Initialise Firebase
    firebase.initializeApp(firebaseConfig);

    // ── Login function ───────────────────────────────────
    function login() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msg      = document.getElementById("msg");
      const btn      = document.getElementById("loginBtn");
      const spinner  = document.getElementById("spinner");
      const btnText  = document.getElementById("btnText");

      // Basic client-side validation
      msg.className = "";
      if (!email || !password) {
        msg.innerText = "Please enter both email and password.";
        return;
      }

      // Loading state
      btn.disabled = true;
      spinner.style.display = "block";
      btnText.innerText = "Verifying...";
      msg.innerText = "";

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          msg.className = "success";
          msg.innerText = "✓ Access granted. Redirecting...";
          // Redirect to dashboard after short delay
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 900);
        })
        .catch((err) => {
          btn.disabled = false;
          spinner.style.display = "none";
          btnText.innerText = "Sign In →";

          // Friendly error messages
          const errors = {
            "auth/user-not-found":       "No admin account found for this email.",
            "auth/wrong-password":        "Incorrect password. Please try again.",
            "auth/invalid-email":         "Please enter a valid email address.",
            "auth/too-many-requests":     "Too many failed attempts. Account temporarily locked.",
            "auth/network-request-failed":"Network error. Check your connection.",
            "auth/invalid-credential":    "Invalid email or password."
          };
          msg.innerText = errors[err.code] || err.message;
        });
    }

    // ── Allow Enter key to submit ────────────────────────
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    // ── Password visibility toggle ───────────────────────
    document.getElementById("pwToggle").addEventListener("click", function () {
      const input = document.getElementById("password");
      if (input.type === "password") {
        input.type = "text";
        this.textContent = "🙈";
      } else {
        input.type = "password";
        this.textContent = "👁";
      }
    });

    // ── If already logged in, redirect immediately ───────
    firebase.auth().onAuthStateChanged((user) => {
      if (user) window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
